<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Form - Better Day Vibes</title>
    <link rel="stylesheet" href="style.css">

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="96x96" href="favicon/favicon.png">
    <link rel="apple-touch-icon" href="favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon/android-chrome-512x512.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="back-home-wrapper">
        <a href="/" class="back-home">← Back to Home</a>
        <div class="about-wrapper">
            <section class="about">

                <h1>Feedback</h1>

                <form class="feedback-form">

                    <input type="text" placeholder="Your Name" required>

                    <input type="email" placeholder="Your Email" required>

                    <textarea placeholder="Share your feedback..." rows="6" required></textarea>

                    <button type="submit">
                        Send Feedback
                    </button>

                </form>

            </section>
        </div>
    </div>

    <footer>
        <div class="footer-links">
            <a href="/about">About Us</a>
            <span>|</span>
            <a href="/privacy-policy">Privacy Policy</a>
            <span>|</span>
            <a href="/terms-and-conditions">Terms & Conditions</a>
            <span>|</span>
            <a href="/feedback">Feedback</a>
        </div>

        <p>© 2026 Better Day Vibes. All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>

</body>

</html>
