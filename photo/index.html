<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Better Day Vibes</title>

<style>
body{
    margin:0;
    background:#0f172a;
    color:white;
    font-family:Poppins,sans-serif;
}

.container{
    max-width:800px;
    margin:auto;
    padding:20px;
}

img{
    width:100%;
    border-radius:15px;
}

.back{
    display:inline-block;
    margin-bottom:20px;
    color:#fbbf24;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

<a href="/" class="back">← Home</a>

<img id="quoteImage">

</div>

<script>

const params =
new URLSearchParams(window.location.search);

const slug =
params.get("slug");

document.getElementById("quoteImage").src =
slug + ".webp";

</script>

</body>
</html>
